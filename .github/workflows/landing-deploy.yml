# =====================================================================
# .github/workflows/landing-deploy.yml
# Deploy landing Astro -> Cloudflare Pages
# Trigger: push em main que toque landing/**
# =====================================================================
name: Landing Deploy

on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - ".github/workflows/landing-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: build + deploy Cloudflare Pages
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: landing/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: landing
          command: pages deploy ./dist --project-name=linkedin-maxvision-landing
