name: mcp-server image

on:
  push:
    branches: [homolog, main]
    tags: ['v*']
    paths:
      - 'mcp-server/**'
      - '.github/workflows/mcp-server-image.yml'
  workflow_dispatch:

jobs:
  build-test:
    name: build + typecheck + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: mcp-server/pnpm-lock.yaml

      - name: install
        run: pnpm install --frozen-lockfile --ignore-workspace

      - name: typecheck
        run: pnpm typecheck

      - name: test
        run: pnpm test --run || echo "no tests yet"

      - name: build
        run: pnpm build

  build-image:
    name: build multi-arch image
    needs: build-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/homolog' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/produtoramaxvision/maxvision-linkedin-mcp
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: mcp-server/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
