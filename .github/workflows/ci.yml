# =====================================================================
# .github/workflows/ci.yml — slim CI: plugin manifest + structure validation
# mcp-server typecheck/build/image lives in mcp-server-image.yml.
# =====================================================================
name: CI

on:
  push:
    branches: [main, homolog]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, homolog]

permissions:
  contents: read

jobs:
  plugin-validation:
    name: plugin validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate plugin manifest
        run: |
          MANIFEST=plugins/linkedin-maxvision/.claude-plugin/plugin.json
          test -f "$MANIFEST" || { echo "missing $MANIFEST"; exit 1; }
          node -e "
            const m = JSON.parse(require('fs').readFileSync('$MANIFEST','utf-8'));
            const required = ['name', 'version', 'description', 'mcpServers'];
            for (const k of required) {
              if (!m[k]) { throw new Error('manifest missing required field: ' + k); }
            }
            console.log('manifest OK:', m.name, m.version);
          "
      - name: Verify plugin structure
        run: |
          set -e
          for d in agents commands skills hooks; do
            test -d "plugins/linkedin-maxvision/$d" || { echo "missing dir: $d"; exit 1; }
          done
          # Hook scripts executable
          for f in plugins/linkedin-maxvision/hooks/*.sh; do
            test -x "$f" || chmod +x "$f"
            bash -n "$f" || { echo "bash syntax fail: $f"; exit 1; }
          done
          echo "plugin structure OK"
