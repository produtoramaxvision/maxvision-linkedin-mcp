# =====================================================================
# .github/workflows/ci.yml  (no repo público maxvision-linkedin-mcp)
# Disparado em: push/main, push/homolog, PR → main, PR → homolog
# Jobs:
#   1. lint-typecheck       (matrix node 20)
#   2. unit-tests           (vitest)
#   3. plugin-validation    (claude plugin-validator)
#   4. build-image-multiarch (linux/amd64,linux/arm64 → ghcr.io)
#   5. swarm-deploy-test    (sobe ephemeral swarm + deploy stack + smoke test)
# =====================================================================
name: CI

on:
  push:
    branches: [main, homolog]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, homolog]

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/linkedin-maxvision-mcp

jobs:
  lint-typecheck:
    name: lint + typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: mcp-server/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  unit-tests:
    name: unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: mcp-server/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:unit -- --reporter=junit --outputFile=junit.xml
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit
          path: mcp-server/junit.xml

  plugin-validation:
    name: plugin validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate plugin manifest
        run: |
          test -f plugins/linkedin-maxvision/plugin.json || { echo "missing plugin.json"; exit 1; }
          node -e "const m = JSON.parse(require('fs').readFileSync('plugins/linkedin-maxvision/plugin.json','utf-8')); if(!m.name||!m.version) throw new Error('missing fields')"

  build-image-multiarch:
    name: build multi-arch image
    runs-on: ubuntu-latest
    needs: [lint-typecheck, unit-tests]
    if: github.event_name == 'push' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: ./mcp-server
          file: ./mcp-server/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  swarm-deploy-test:
    name: swarm deploy smoke test
    runs-on: ubuntu-latest
    needs: build-image-multiarch
    if: github.ref == 'refs/heads/homolog' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Init ephemeral swarm
        run: |
          docker swarm init --advertise-addr 127.0.0.1 || true
          docker network create --driver overlay --attachable net || true
      - name: Generate ephemeral env
        run: |
          {
            echo "MCP_HOST=mcp.local.test"
            echo "MCP_VERSION=sha-${GITHUB_SHA:0:7}"
            echo "POSTGRES_PASSWORD=$(openssl rand -hex 32)"
            echo "MASTER_KEY=$(openssl rand -hex 32)"
            echo "WEBHOOK_SECRET=$(openssl rand -hex 32)"
            echo "LI_COOKIES_JSON=[]"
            echo "LICENSE_KEY="
          } > .env.ci
      - name: Deploy stack
        run: |
          set -a && . ./.env.ci && set +a
          docker stack deploy -c sprint0-deliverables/portainer/portainer-stack-vmmvp.yml maxv-test
      - name: Wait + smoke test
        run: |
          for i in {1..30}; do
            STATE=$(docker service ps maxv-test_mcp --filter "desired-state=running" --format "{{.CurrentState}}" | head -1)
            echo "iter=$i state=$STATE"
            [[ "$STATE" == Running* ]] && break
            sleep 10
          done
          docker service logs maxv-test_mcp --tail 50 || true
          # smoke: container responde /health
          MCP_CID=$(docker ps -q --filter "label=com.docker.swarm.service.name=maxv-test_mcp" | head -1)
          docker exec "$MCP_CID" wget -qO- http://localhost:3000/health || (docker service logs maxv-test_mcp; exit 1)
      - name: Tear down
        if: always()
        run: docker stack rm maxv-test || true
