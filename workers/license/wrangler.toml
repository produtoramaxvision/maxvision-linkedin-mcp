name = "maxv-linkedin-license"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Route — endpoint canônico único (migrado 2026-05-15)
routes = [
  { pattern = "linkedin-license.produtoramaxvision.com.br/v1/*", zone_name = "produtoramaxvision.com.br" },
]

# KV namespace for license key storage. Create with:
#   wrangler kv:namespace create maxv-linkedin-licenses
[[kv_namespaces]]
binding = "LICENSES"
id = "fe9f907e596f49598d3bc4579c0b1a56"

[vars]
# Public, baked-in. Stripe webhook secret + signing key live in dashboard.
ENVIRONMENT = "production"

# Set via `wrangler secret put STRIPE_WEBHOOK_SECRET`.
# Set via `wrangler secret put STRIPE_SECRET_KEY`.
# Set via `wrangler secret put ADMIN_TOKEN` for /v1/revoke.
