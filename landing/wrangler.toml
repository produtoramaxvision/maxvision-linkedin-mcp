# ============================================================
# Cloudflare Pages config — landing linkedin.produtoramaxvision.com.br
#
# Stack: HTML estatico + Tailwind CDN + Pages Functions (functions/api/waitlist.ts)
# Sem build step — wrangler pages deploy envia o diretorio ./ direto.
#
# Apos primeiro deploy:
#   1. Pages Dashboard ou MCP -> custom domain linkedin.produtoramaxvision.com.br
#   2. Settings -> Environment Variables -> adicionar:
#        RESEND_API_KEY     (encrypted)
#        RESEND_AUDIENCE_ID (plain ou encrypted)
# ============================================================
name = "linkedin-maxvision-landing"
compatibility_date = "2026-05-08"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "."

[vars]
PUBLIC_SITE_URL = "https://linkedin.produtoramaxvision.com.br"
PUBLIC_GHCR_REPO = "produtoramaxvision/linkedin-maxvision-mcp"
