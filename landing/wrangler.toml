# ============================================================
# Cloudflare Pages config — landing linkedin.produtoramaxvision.com.br
#
# Após deploy via `wrangler pages deploy`:
#   1. Pages Dashboard → projeto linkedin-maxvision-landing → Custom domains
#   2. Add custom domain: linkedin.produtoramaxvision.com.br
#      (Pages cria CNAME automaticamente na zone produtoramaxvision.com.br)
#   3. Settings → Environment Variables → adicionar:
#        RESEND_API_KEY     (encrypted)
#        RESEND_AUDIENCE_ID (plain ou encrypted)
# ============================================================
name = "linkedin-maxvision-landing"
compatibility_date = "2026-05-08"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

[vars]
PUBLIC_SITE_URL = "https://linkedin.produtoramaxvision.com.br"
PUBLIC_GHCR_REPO = "produtoramaxvision/linkedin-maxvision-mcp"
