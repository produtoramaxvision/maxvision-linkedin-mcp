# ============================================================
# MaxVision LinkedIn MCP — portainer-stack.yml
# Modo: Portainer Stack (Compose ou Swarm via UI/API)
# Uso recomendado: deploy via Portainer → Stacks → Add stack → Git Repository
#   Repository URL:    https://github.com/produtoramaxvision/maxvision-linkedin-mcp
#   Repository ref:    refs/heads/main
#   Compose path:      mcp-server/docker/portainer-stack.yml
#   GitOps updates:    ON (polling 5min ou webhook)
#   Re-pull image:     ON
#
# Diferenças vs docker-stack.yml:
#   - Aceita variáveis de ambiente do Portainer (UI / webhook URL).
#   - Secrets podem ser definidos no Portainer ou via env vars (fallback).
#   - Compatível com Compose mode (single-host) E Swarm mode.
#
# IMPORTANTE: para Swarm, criar previamente os secrets externos.
# Para Compose mode, Portainer cria volumes locais para secrets.
# ============================================================
version: "3.9"

services:
  mcp:
    image: ghcr.io/produtoramaxvision/linkedin-maxvision-mcp:${MCP_VERSION:-latest}
    environment:
      NODE_ENV: production
      PORT: 3000
      METRICS_PORT: 9090
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_URL: postgres://mcp:${POSTGRES_PASSWORD}@postgres:5432/mcp
      REDIS_URL: redis://redis:6379
      MASTER_KEY: ${MASTER_KEY}
      LICENSE_KEY: ${LICENSE_KEY:-}
      LI_COOKIES_JSON: ${LI_COOKIES_JSON}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      ENABLE_WEBHOOKS: ${ENABLE_WEBHOOKS:-true}
      SSE_ENABLED: ${SSE_ENABLED:-true}
      PATCHRIGHT_HEADLESS: "true"
      MAXVISION_TELEMETRY: ${MAXVISION_TELEMETRY:-on}
    volumes:
      - patchright-cache:/ms-playwright
      - profile-data:/var/data/profiles
      - screenshot-data:/var/data/screenshots
      - mcp-logs:/var/log/mcp
    networks:
      - traefik-public
      - mcp-internal
    deploy:
      mode: replicated
      replicas: ${MCP_REPLICAS:-1}
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
      labels:
        traefik.enable: "true"
        traefik.docker.network: "traefik-public"
        traefik.http.routers.linkedin-mcp.rule: "Host(`${MCP_HOST}`)"
        traefik.http.routers.linkedin-mcp.entrypoints: "websecure"
        traefik.http.routers.linkedin-mcp.tls: "true"
        traefik.http.routers.linkedin-mcp.tls.certresolver: "${ACME_RESOLVER:-letsencrypt}"
        traefik.http.services.linkedin-mcp.loadbalancer.server.port: "3000"
        traefik.http.services.linkedin-mcp.loadbalancer.healthcheck.path: "/health"
        traefik.http.services.linkedin-mcp.loadbalancer.healthcheck.interval: "30s"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mcp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: mcp
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - mcp-internal
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp -d mcp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    networks:
      - mcp-internal
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  patchright-cache:
  profile-data:
  screenshot-data:
  mcp-logs:

networks:
  traefik-public:
    external: true
  mcp-internal:
    driver: overlay
    attachable: true
