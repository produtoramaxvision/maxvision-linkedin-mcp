# ============================================================
# MaxVision LinkedIn MCP — Portainer Stack (VPS vmmvp)
# Pré-preenchido para a VPS arm64 ubuntu@163.176.233.224
#
# DIFERENÇAS vs portainer-stack.yml genérico do blueprint:
#   - Network externa: `net` (já existe, é onde Traefik 3.4 está)  -- NÃO criar `traefik-public`.
#   - Cert resolver: `letsencryptresolver` (nome atual no Traefik). NÃO `letsencrypt`.
#   - Postgres dedicado isolado (NÃO compartilhar `postgres_postgres` v14 — está velho e
#     já carrega n8n_queue, evolution, plane, shlink). Padrão idêntico ao
#     `firecrawl_mxv_*`, `cliproxy_mxv_*`, `paperclip_mxv_*`, `pgvector_mxv_*`.
#   - Imagem MCP precisa ser arm64 (CI multi-arch builda `linux/amd64,linux/arm64`).
#
# DEPLOY (manual, via Portainer UI):
#   1. Portainer → Stacks → Add stack
#   2. Name: maxv-linkedin
#   3. Build method: Web editor (cole o conteúdo deste arquivo)
#      OU Repository → URL=github.com/produtoramaxvision/maxvision-linkedin-mcp
#         Reference=refs/heads/main, Compose path=sprint0-deliverables/portainer/portainer-stack-vmmvp.yml
#   4. Em "Environment variables", definir:
#        MCP_HOST=linkedin-mcp.meuagente.api.br
#        MCP_VERSION=0.1.0           # (ou tag específica após CI buildar)
#        POSTGRES_PASSWORD=<gerar com: openssl rand -hex 32>
#        MASTER_KEY=<openssl rand -hex 32>
#        WEBHOOK_SECRET=<openssl rand -hex 32>
#        LI_COOKIES_JSON=<conteúdo JSON do cookie LinkedIn — ver docs>
#        LICENSE_KEY=                # vazio em sandbox
#        ACME_EMAIL=produtoramaxvision@gmail.com
#   5. Deploy.
#
# IMPORTANTE: este stack NÃO é deployado automaticamente. Geração do compose
# é responsabilidade do Claude; deploy é manual via Portainer (decisão do owner).
# ============================================================
version: "3.9"

services:
  mcp:
    image: ghcr.io/produtoramaxvision/linkedin-maxvision-mcp:${MCP_VERSION:-0.1.0}
    environment:
      NODE_ENV: production
      PORT: "3000"
      METRICS_PORT: "9090"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_URL: postgres://mcp:${POSTGRES_PASSWORD}@postgres:5432/mcp
      REDIS_URL: redis://redis:6379
      MASTER_KEY: ${MASTER_KEY}
      LICENSE_KEY: ${LICENSE_KEY:-}
      LI_COOKIES_JSON: ${LI_COOKIES_JSON:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      ENABLE_WEBHOOKS: ${ENABLE_WEBHOOKS:-true}
      SSE_ENABLED: ${SSE_ENABLED:-true}
      PATCHRIGHT_HEADLESS: "true"
      MAXVISION_TELEMETRY: ${MAXVISION_TELEMETRY:-on}
      TZ: America/Sao_Paulo
    volumes:
      - patchright-cache:/ms-playwright
      - profile-data:/var/data/profiles
      - screenshot-data:/var/data/screenshots
      - mcp-logs:/var/log/mcp
    networks:
      - net
      - mcp-internal
    deploy:
      mode: replicated
      replicas: ${MCP_REPLICAS:-1}
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=net"
        - "traefik.http.routers.linkedin-mcp.rule=Host(`${MCP_HOST}`)"
        - "traefik.http.routers.linkedin-mcp.entrypoints=websecure"
        - "traefik.http.routers.linkedin-mcp.tls=true"
        - "traefik.http.routers.linkedin-mcp.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.linkedin-mcp.loadbalancer.server.port=3000"
        - "traefik.http.services.linkedin-mcp.loadbalancer.healthcheck.path=/health"
        - "traefik.http.services.linkedin-mcp.loadbalancer.healthcheck.interval=30s"
        - "traefik.http.middlewares.linkedin-mcp-ratelimit.ratelimit.average=100"
        - "traefik.http.middlewares.linkedin-mcp-ratelimit.ratelimit.burst=50"
        - "traefik.http.routers.linkedin-mcp.middlewares=linkedin-mcp-ratelimit@swarm"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mcp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: mcp
      TZ: America/Sao_Paulo
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - mcp-internal
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp -d mcp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis-data:/data
    networks:
      - mcp-internal
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  patchright-cache:
  profile-data:
  screenshot-data:
  mcp-logs:

networks:
  net:
    external: true
  mcp-internal:
    driver: overlay
    attachable: true
