# ============================================================
# MaxVision LinkedIn MCP — Portainer Stack (VPS vmmvp) — v0.13.1
# Pré-preenchido para a VPS arm64 ubuntu@163.176.233.224
#
# Convenções específicas desta VPS:
#   - Network externa: `net` (Traefik 3.4 já está nela; NÃO criar `traefik-public`).
#   - Cert resolver: `letsencryptresolver` (nome atual; NÃO `letsencrypt`).
#   - Postgres dedicado isolado. Padrão `*_mxv_*`.
#   - Imagem MCP arm64 (CI multi-arch builda linux/amd64 + linux/arm64).
#   - Domínio: linkedin-mcp.produtoramaxvision.com.br (DNS-only/gray no Cloudflare).
#
# DEPLOY (manual, via Portainer UI):
#   1. Portainer → Stacks → Edit stack
#   2. Em "Environment variables", definir TODAS as variáveis abaixo:
#
#   === OBRIGATÓRIAS ===
#        MCP_VERSION=sha-86b6cd0            # ou "latest" para sempre usar main
#        MCP_HOST=linkedin-mcp.produtoramaxvision.com.br
#        POSTGRES_PASSWORD=<valor atual>
#        MASTER_KEY=<valor atual 64 hex chars>
#        MCP_API_KEYS=mxv_xxx,mxv_yyy
#        ACME_EMAIL=produtoramaxvision@gmail.com
#
#   === APIFY (backend principal — 13/15 tools) ===
#        APIFY_TOKEN=<apify token>
#        LIST_FEED_APIFY_FALLBACK=true
#        LIST_FEED_APIFY_QUERY=linkedin
#
#   === BRIGHTDATA Web Unlocker (search_jobs, list_feed path A) ===
#        SCRAPING_BACKEND=patchright
#        PATCHRIGHT_PROXY_URL=http://brd.superproxy.io:33335
#        PATCHRIGHT_PROXY_USERNAME=brd-customer-hl_ceb7cc08-zone-maxv_linkedin_unlocker
#        PATCHRIGHT_PROXY_PASSWORD=<zone password>
#
#   === BRIGHTDATA Scraper API (get_profile mode=full) ===
#        BRIGHTDATA_API_TOKEN=<account-level token>
#        BRIGHTDATA_LINKEDIN_PROFILE_DATASET_ID=gd_l1viktl72bvl7bjuj0
#
#   === OPCIONAIS ===
#        LOG_LEVEL=info
#        RATE_LIMIT_PER_MINUTE=10
#        LICENSE_CHECK_ENABLED=false    # true em produção paga
#
#   3. Deploy.
# ============================================================
version: "3.9"

services:
  mcp-server:
    image: ghcr.io/produtoramaxvision/maxvision-linkedin-mcp:${MCP_VERSION:-0.1.0-sprint1}
    environment:
      NODE_ENV: production
      MCP_TRANSPORT: http
      MCP_PORT: "3000"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgres://mcp:${POSTGRES_PASSWORD}@mcp_postgres:5432/mcp
      REDIS_URL: redis://mcp_redis:6379
      MASTER_KEY: ${MASTER_KEY}
      MCP_API_KEYS: ${MCP_API_KEYS}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-10}
      PROFILE_BASE_DIR: /data/profiles
      TZ: America/Sao_Paulo
      # Apify backend
      APIFY_TOKEN: ${APIFY_TOKEN}
      LIST_FEED_APIFY_FALLBACK: ${LIST_FEED_APIFY_FALLBACK:-true}
      LIST_FEED_APIFY_QUERY: ${LIST_FEED_APIFY_QUERY:-linkedin}
      # BrightData Web Unlocker (search_jobs / patchright path A)
      SCRAPING_BACKEND: ${SCRAPING_BACKEND:-patchright}
      PATCHRIGHT_PROXY_URL: ${PATCHRIGHT_PROXY_URL}
      PATCHRIGHT_PROXY_USERNAME: ${PATCHRIGHT_PROXY_USERNAME}
      PATCHRIGHT_PROXY_PASSWORD: ${PATCHRIGHT_PROXY_PASSWORD}
      # BrightData Scraper API (get_profile full mode)
      BRIGHTDATA_API_TOKEN: ${BRIGHTDATA_API_TOKEN}
      BRIGHTDATA_LINKEDIN_PROFILE_DATASET_ID: ${BRIGHTDATA_LINKEDIN_PROFILE_DATASET_ID:-gd_l1viktl72bvl7bjuj0}
      # License
      LICENSE_CHECK_ENABLED: ${LICENSE_CHECK_ENABLED:-false}
    volumes:
      - mcp_profiles_data:/data/profiles
    networks:
      - net
      - mcp_internal
    depends_on:
      - mcp_postgres
      - mcp_redis
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      mode: replicated
      replicas: ${MCP_REPLICAS:-1}
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
      resources:
        limits:
          cpus: "1.5"
          memory: 1024M
        reservations:
          cpus: "0.5"
          memory: 256M
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=net"
        - "traefik.http.routers.mcp-server.rule=Host(`${MCP_HOST}`)"
        - "traefik.http.routers.mcp-server.entrypoints=websecure"
        - "traefik.http.routers.mcp-server.tls=true"
        - "traefik.http.routers.mcp-server.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.mcp-server.loadbalancer.server.port=3000"

  mcp_postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mcp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: mcp
      TZ: America/Sao_Paulo
    volumes:
      - mcp_postgres_data:/var/lib/postgresql/data
    networks:
      - mcp_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp -d mcp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 5
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  mcp_redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - mcp_redis_data:/data
    networks:
      - mcp_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 5
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

volumes:
  mcp_postgres_data:
  mcp_redis_data:
  mcp_profiles_data:

networks:
  net:
    external: true
  mcp_internal:
    driver: overlay
    attachable: true
