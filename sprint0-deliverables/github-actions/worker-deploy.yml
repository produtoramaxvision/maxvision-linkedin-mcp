# =====================================================================
# .github/workflows/worker-deploy.yml
# Deploy license server Cloudflare Worker
# DEFERIDO: ativar quando Sprint 3 (license gating) chegar.
# Trigger: push em main que toque sprint0-deliverables/cloudflare-worker/**
# =====================================================================
name: Worker Deploy

on:
  push:
    branches: [main]
    paths:
      - "sprint0-deliverables/cloudflare-worker/**"
      - "license-server/**"
      - ".github/workflows/worker-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: deploy linkedin-license worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sprint0-deliverables/cloudflare-worker
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: sprint0-deliverables/cloudflare-worker/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: sprint0-deliverables/cloudflare-worker
          command: deploy
